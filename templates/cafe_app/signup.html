{% extends 'base.html' %}

{% block title %}Sign Up - XML Cafe System{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 offset-md-3">
        <div class="card auth-card">
            <div class="card-header">
                <i class="fas fa-user-plus"></i> Join XML Cafe System
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3 auth-field">
                        <label for="{{ form.username.id_for_label }}" class="form-label">Username</label>
                        <div class="auth-control">
                            {{ form.username }}
                        </div>
                    </div>
                    <div class="mb-3 auth-field">
                        <label for="{{ form.password1.id_for_label }}" class="form-label">Password</label>
                        <div class="auth-control">
                            <div class="password-field">
                                {{ form.password1 }}
                                <button type="button" class="btn btn-outline-primary password-toggle" data-toggle-password="#{{ form.password1.id_for_label }}" aria-label="Show password">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3 auth-field">
                        <label for="{{ form.password2.id_for_label }}" class="form-label">Confirm Password</label>
                        <div class="auth-control">
                            <div class="password-field">
                                {{ form.password2 }}
                                <button type="button" class="btn btn-outline-primary password-toggle" data-toggle-password="#{{ form.password2.id_for_label }}" aria-label="Show password">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-user-plus"></i> Sign Up
                    </button>
                </form>
            </div>
            <div class="card-footer text-center">
                <p class="mb-0">Already have an account? <a href="{% url 'login' %}">Login here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
